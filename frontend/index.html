<!doctype html>
<html>
  <head>
    <title>BFHL API Tester</title>
    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 40px;
      }

      textarea {
        width: 400px;
        height: 120px;
        padding: 10px;
        border-radius: 8px;
        border: none;
        margin-bottom: 10px;
      }

      button {
        padding: 10px 20px;
        border: none;
        background: #6366f1;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }

      pre {
        text-align: left;
        background: #1e293b;
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
        overflow-x: auto;
      }
    </style>
  </head>

  <body>
    <h1>BFHL API Tester</h1>

    <p>Enter edges (comma separated)</p>

    <textarea id="input">A->B, A->C, B->D</textarea><br />

    <button onclick="sendData()">Submit</button>

    <pre id="output">Response will appear here...</pre>

    <script>
      async function sendData() {
        const raw = document.getElementById("input").value;

        // Convert input to array
        const data = raw.split(",").map((x) => x.trim());

        try {
          const res = await fetch("https://bfhl-api-zpf6.onrender.com/bfhl", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ data }),
          });

          const result = await res.json();

          document.getElementById("output").innerText = JSON.stringify(
            result,
            null,
            2,
          );
        } catch (err) {
          document.getElementById("output").innerText = "Error: " + err.message;
        }
      }
    </script>
  </body>
</html>
